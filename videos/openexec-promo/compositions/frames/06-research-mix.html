<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>06-research-mix</title>
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "Barlow";
          font-weight: 400;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-400.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 600;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-600.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 700;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-700.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 800;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-800.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 900;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-900.woff2") format("woff2");
        }
        @font-face {
          font-family: "IBM Plex Mono";
          font-weight: 500;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/ibm-plex-mono-500.woff2") format("woff2");
        }

        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: "Barlow", sans-serif;
          container-type: size;
        }

        /* Full-bleed ground — dedicated clip layer, never on #root directly. */
        .ground {
          position: absolute;
          inset: 0;
          background: #111111;
        }

        .stage {
          position: absolute;
          inset: 0;
          perspective: 1800px;
        }

        /* Split-tilt stage — two panels sharing one perspective parent.
           Widths are the asymmetric 70/30 (the frame's documented deviation
           from the blueprint's default equal split), meeting at a 1px divider. */
        .split-stage {
          position: absolute;
          inset: 0;
          display: flex;
          transform-style: preserve-3d;
        }

        .panel {
          position: relative;
          height: 100%;
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding: 0 5.5cqw;
          transform-style: preserve-3d;
          opacity: 0;
          will-change: transform, opacity;
        }

        /* Left panel — 70% width, dark register: ink-black ground, cream + orange text. */
        .panel-left {
          width: 70cqw;
          background: #111111;
        }

        /* Right panel — 30% width, orange register: fire-orange ground, ink text.
           "ink-on-fire is absolute" — no cream text on orange. */
        .panel-right {
          width: 30cqw;
          background: #e85d26;
          align-items: flex-start;
        }

        /* 1px divider between panels, per the Compare treatment's own spec. */
        .divider {
          position: absolute;
          top: 0;
          bottom: 0;
          left: 70cqw;
          width: 1px;
          background: #282826;
          z-index: 3;
          transform: translateX(-0.5px);
        }

        /* Divider glow sweep — traveling highlight, one pass, per ambient-glow-bloom. */
        .divider-glow {
          position: absolute;
          top: 0;
          bottom: 0;
          left: 70cqw;
          width: 220px;
          margin-left: -110px;
          background: linear-gradient(
            90deg,
            rgba(232, 93, 38, 0) 0%,
            rgba(232, 93, 38, 0.35) 50%,
            rgba(232, 93, 38, 0) 100%
          );
          opacity: 0;
          z-index: 4;
          pointer-events: none;
          will-change: transform, opacity;
        }

        .kicker {
          font-family: "IBM Plex Mono", monospace;
          font-weight: 500;
          font-size: 0.9cqw;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          white-space: nowrap;
          opacity: 0;
        }

        .kicker-left {
          color: #e85d26;
        }

        .kicker-right {
          color: rgb(58, 26, 13);
        }

        .rule-stub {
          width: 36px;
          height: 2px;
          margin-bottom: 1.4cqw;
          background: #e85d26;
        }

        .rule-stub-right {
          background: #111111;
        }

        .kicker-row {
          display: flex;
          align-items: center;
          gap: 1cqw;
          margin-bottom: 1.4cqw;
        }

        /* Numeral — Barlow stat-value ramp, weight 900, negative tracking. */
        .numeral {
          margin: 0;
          font-family: "Barlow", sans-serif;
          font-weight: 900;
          line-height: 1.0;
          letter-spacing: -0.04em;
          transform: scale(0);
          transform-origin: 0% 50%;
          will-change: transform, opacity;
        }

        .numeral-left {
          font-size: 9.5cqw;
          color: #e85d26;
        }

        .numeral-right {
          font-size: 6.5cqw;
          color: #111111;
        }

        .sub-label {
          margin-top: 1.2cqw;
          font-family: "Barlow", sans-serif;
          font-weight: 400;
          font-size: 1.2cqw;
          line-height: 1.5;
          opacity: 0;
        }

        .sub-label-left {
          color: rgba(240, 236, 229, 0.75);
        }

        .sub-label-right {
          color: rgb(58, 26, 13);
        }

        /* Baseline flag label under the numerals — carries forward the
           terminal flag syntax from Frame 5 ("--research-mix web=0.7,kb=0.3"). */
        .flag-tag {
          position: absolute;
          bottom: 19cqh;
          font-family: "IBM Plex Mono", monospace;
          font-weight: 500;
          font-size: 0.78cqw;
          letter-spacing: 0.08em;
          opacity: 0;
        }

        .flag-tag-left {
          left: 5.5cqw;
          color: rgb(125, 124, 121);
        }
      </style>

      <div data-hf-id="hf-jney" id="root" data-composition-id="06-research-mix" data-width="1920" data-height="1080" data-duration="8.4">
        <div data-hf-id="hf-jipv" id="ground-06-research-mix" class="clip ground" data-start="0" data-duration="8.4" data-track-index="0"></div>

        <div data-hf-id="hf-tan6" class="stage">
          <div data-hf-id="hf-er3l" class="split-stage">
            <div data-hf-id="hf-0ud0" class="panel panel-left" id="panel-left">
              <div data-hf-id="hf-iiwo" class="kicker-row">
                <div data-hf-id="hf-har7" class="rule-stub"></div>
                <div data-hf-id="hf-3637" class="kicker kicker-left" id="kicker-left">Web Search</div>
              </div>
              <h2 data-hf-id="hf-89ni" class="numeral numeral-left" id="numeral-left">0.7</h2>
              <p data-hf-id="hf-upmp" class="sub-label sub-label-left" id="sub-left">Live research grounding, weighted majority.</p>
            </div>

            <div data-hf-id="hf-nv3e" class="panel panel-right" id="panel-right">
              <div data-hf-id="hf-wob4" class="kicker-row">
                <div data-hf-id="hf-rjud" class="rule-stub rule-stub-right"></div>
                <div data-hf-id="hf-kwxu" class="kicker kicker-right" id="kicker-right">Knowledge Base</div>
              </div>
              <h2 data-hf-id="hf-3698" class="numeral numeral-right" id="numeral-right">0.3</h2>
              <p data-hf-id="hf-g3l6" class="sub-label sub-label-right" id="sub-right">Internal docs, minority weight.</p>
            </div>
          </div>

          <div data-hf-id="hf-jk23" class="divider"></div>
          <div data-hf-id="hf-d612" class="divider-glow" id="divider-glow"></div>

          <div data-hf-id="hf-k38y" class="flag-tag flag-tag-left" id="flag-tag">--research-mix web=0.7,kb=0.3</div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        var panelLeft = document.getElementById("panel-left");
        var panelRight = document.getElementById("panel-right");
        var kickerLeft = document.getElementById("kicker-left");
        var kickerRight = document.getElementById("kicker-right");
        var numeralLeft = document.getElementById("numeral-left");
        var numeralRight = document.getElementById("numeral-right");
        var subLeft = document.getElementById("sub-left");
        var subRight = document.getElementById("sub-right");
        var divGlow = document.getElementById("divider-glow");
        var flagTag = document.getElementById("flag-tag");

        var tl = gsap.timeline({ paused: true });

        // Scene 1 (0.0-0.8s): transition-owned crossfade in from Frame 5's terminal
        // line — no new rule here, ground already painted, panels stay unmounted
        // (opacity 0) through this window.

        // Scene 2 (0.8-3.5s): left panel (70%) enters from the left wing with a
        // mirrored 3D book-open tilt (split-tilt-cards signature move), settling
        // flush. Kicker "WEB SEARCH" fades in, then "0.7" spring-pops in fire-orange.
        tl.fromTo(
          panelLeft,
          { x: -420, rotateY: 26, opacity: 0 },
          { x: 0, rotateY: 14, opacity: 1, duration: 1.0, ease: "power3.out" },
          0.8
        );

        tl.fromTo(
          kickerLeft.parentElement,
          { opacity: 0 },
          { opacity: 1, duration: 0.5, ease: "power3.out" },
          2.0
        );

        // spring-pop-entrance: fromTo scale 0 -> 1, power3.out, no overshoot —
        // the real ratio value landing on its own beat.
        tl.fromTo(
          numeralLeft,
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.55, ease: "power3.out" },
          2.5
        );

        tl.fromTo(
          subLeft,
          { opacity: 0, y: 14 },
          { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" },
          3.0
        );

        // Scene 3 (3.5-6.0s): right panel (30%) enters from the right wing with the
        // opposing mirrored tilt, settles flush against the 1px divider. Kicker
        // "KNOWLEDGE BASE" (ink-on-fire) fades in, then "0.3" spring-pops in ink.
        tl.fromTo(
          panelRight,
          { x: 420, rotateY: -26, opacity: 0 },
          { x: 0, rotateY: -14, opacity: 1, duration: 1.0, ease: "power3.out" },
          3.5
        );

        tl.fromTo(
          kickerRight.parentElement,
          { opacity: 0 },
          { opacity: 1, duration: 0.5, ease: "power3.out" },
          4.7
        );

        tl.fromTo(
          numeralRight,
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.55, ease: "power3.out" },
          5.2
        );

        tl.fromTo(
          subRight,
          { opacity: 0, y: 14 },
          { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" },
          5.7
        );

        // Scene 4 (6.0-8.0s): both panels hold side-by-side, static. The
        // --research-mix flag tag (continuity with Frame 5's terminal command)
        // fades in, then one accent glow sweeps once left-to-right across the
        // divider (ambient-glow-bloom, traveling-sweep form, single pass) and
        // settles. Holds to end.
        tl.fromTo(
          flagTag,
          { opacity: 0 },
          { opacity: 1, duration: 0.5, ease: "power2.out" },
          6.0
        );

        tl.fromTo(
          divGlow,
          { x: -300, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.5, ease: "none" },
          6.4
        );
        tl.to(divGlow, { x: 300, opacity: 0, duration: 0.9, ease: "power1.in" }, 6.9);

        window.__timelines["06-research-mix"] = tl;
      </script>
    </template>
  </body>
</html>
