<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>08-cta</title>
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "Barlow";
          font-weight: 400;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-400.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 600;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-600.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 700;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-700.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 800;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-800.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 900;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-900.woff2") format("woff2");
        }
        @font-face {
          font-family: "IBM Plex Mono";
          font-weight: 500;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/ibm-plex-mono-500.woff2") format("woff2");
        }

        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: "Barlow", sans-serif;
          container-type: size;
        }

        .ground {
          position: absolute;
          inset: 0;
          background: #e85d26;
        }

        .stage {
          position: absolute;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
        }

        /* Wordmark — Barlow display: 13cqw, weight 900, lowercase, -0.04em, lh 0.88.
           Dead-center per Frame 8's cta-morph-press adaptation (Frame 3 bookend leans
           left; this is the closing lockup, centered). */
        .wordmark-wrap {
          position: relative;
          max-width: 78cqw;
          text-align: center;
          transform-origin: 50% 50%;
        }

        .wordmark {
          margin: 0;
          font-family: "Barlow", sans-serif;
          font-weight: 900;
          font-size: 13cqw;
          line-height: 0.88;
          letter-spacing: -0.04em;
          text-transform: lowercase;
          color: #111111;
          opacity: 0;
          will-change: transform, opacity;
        }

        /* Closing line — IBM Plex Mono uppercase, tracked, three short clauses
           typed on beneath the wordmark. Fixed min-height avoids layout jump as
           the discrete text states change length. */
        .tagline-wrap {
          position: relative;
          margin-top: 3.5cqw;
          min-height: 1.4cqw;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .tagline {
          margin: 0;
          font-family: "IBM Plex Mono", monospace;
          font-weight: 500;
          font-size: 0.9cqw;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: rgba(17, 17, 17, 0.55);
          white-space: nowrap;
        }
      </style>

      <div data-hf-id="hf-prpg" id="root" data-composition-id="08-cta" data-width="1920" data-height="1080" data-duration="6">
        <div data-hf-id="hf-2e9t" id="ground-08-cta" class="clip ground" data-start="0" data-duration="6" data-track-index="0"></div>

        <div data-hf-id="hf-tan6" class="stage">
          <div data-hf-id="hf-0jce" class="wordmark-wrap" id="wordmark-wrap">
            <h1 data-hf-id="hf-zx95" class="wordmark" id="wordmark">OpenExec</h1>
          </div>

          <div data-hf-id="hf-zkxb" class="tagline-wrap">
            <p data-hf-id="hf-zxbh" class="tagline" id="tagline"></p>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        var wordmarkWrapEl = document.getElementById("wordmark-wrap");
        var wordmarkEl = document.getElementById("wordmark");
        var taglineEl = document.getElementById("tagline");

        var tl = gsap.timeline({ paused: true });

        // Scene 1 (0.0-2.0s): zoom-through arrival lands on fire-orange ground;
        // "OpenExec" resolves dead-center as a spring-pop entrance (scale 0->1,
        // power3.out, no overshoot) -- the cta-morph-press "presence" beat, same
        // Cover treatment as Frame 3, now centered as the closing lockup.
        tl.fromTo(
          wordmarkEl,
          { scale: 0.6, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.55, ease: "power3.out" },
          0.05
        );

        // Faint rotational-only resting breath begins once the pop settles
        // (sin(0) = 0 at IDLE_START so there is no jump from the settled scale).
        // Low-amplitude, deterministic (sine-driven, no Math.random/Date.now).
        var IDLE_START = 0.7;
        var breathDriver = { p: 0 };
        tl.to(
          breathDriver,
          {
            p: Math.PI * 2 * 2.2,
            duration: 6 - IDLE_START,
            ease: "none",
            onUpdate: function () {
              var rot = Math.sin(breathDriver.p) * 0.35;
              wordmarkWrapEl.style.transform = "rotate(" + rot.toFixed(3) + "deg)";
            }
          },
          IDLE_START
        );

        // Scene 2 (2.0-4.5s): cue 2 types on beneath the wordmark as three short
        // clauses with a brief hard-cut pause between each -- discrete-text-sequence,
        // matching the video's own three-part promise (teams / research / decisions).
        var SEQUENCE = [
          { t: 2.0, text: "" },
          { t: 2.15, text: "REAL TEAMS." },
          { t: 2.9, text: "" },
          { t: 3.15, text: "REAL RESEARCH." },
          { t: 3.9, text: "" },
          { t: 4.15, text: "REAL DECISIONS." }
        ];

        function textAt(time) {
          for (var i = SEQUENCE.length - 1; i >= 0; i--) {
            if (time >= SEQUENCE[i].t) return SEQUENCE[i].text;
          }
          return "";
        }

        var seqDriver = { t: 0 };
        tl.to(
          seqDriver,
          {
            t: 6,
            duration: 6,
            ease: "none",
            onUpdate: function () {
              taglineEl.textContent = textAt(seqDriver.t);
            }
          },
          0
        );

        // Scene 3 (4.5-6.0s): holds, static, dead-center, to the end -- the final
        // frame's real settle. No further motion after the tagline lands; this
        // hold IS the video's exit (per the seek-safe core, only the final frame
        // gets one).

        window.__timelines["08-cta"] = tl;
      </script>
    </template>
  </body>
</html>
