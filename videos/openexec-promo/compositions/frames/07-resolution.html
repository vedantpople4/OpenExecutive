      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        var kickerWrap = document.getElementById("kicker-wrap");
        var card1 = document.getElementById("card-1");
        var card2 = document.getElementById("card-2");
        var card3 = document.getElementById("card-3");

        var tl = gsap.timeline({ paused: true });

        // Scene 1 (0.0-1.0s): ink-black ground already painted by the .ground clip.
        // Mono kicker fades in top-left, per frame.md's kicker component + Frame 4/5's
        // chrome placement convention.
        tl.fromTo(kickerWrap, { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power3.out" }, 0.2);

        // Scenes 2-4: three real board_report.md action items populate the vertical
        // list, one at a time (~1 item/sec pacing per grid-card-assemble's Benefits
        // vertical-list BUILD sub-mode), each fully co-resident once it lands — the
        // earlier cards stay fully lit while the next arrives (accumulating, not
        // dimming). Each card is skinned as a Stat Grid top-border card: 1px hairline
        // top + mono index/labels, per the Adapt note. Entrance = spring-pop-entrance
        // (smooth power3.out settle, no overshoot — house style) combined with a short
        // center-outward-expansion-style slide-into-slot (small y-rise, no real burst
        // since these are single co-resident list rows, not a clustered group).

        // Scene 2 (1.0-4.5s): card 1 enters.
        tl.fromTo(
          card1,
          { opacity: 0, y: 28, scale: 0.96 },
          { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "power3.out" },
          1.2
        );

        // Scene 3 (4.5-8.0s): card 2 enters beneath; card 1 remains fully lit.
        tl.fromTo(
          card2,
          { opacity: 0, y: 28, scale: 0.96 },
          { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "power3.out" },
          4.7
        );

        // Scene 4 (8.0-11.0s): card 3 enters; all three now co-resident.
        tl.fromTo(
          card3,
          { opacity: 0, y: 28, scale: 0.96 },
          { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "power3.out" },
          8.2
        );

        // Scene 5 (11.0-12.0s): all three hold, static, full read. A subtle
        // deterministic jitter (sin-driven, not CSS) keeps the frame alive without
        // introducing any new motion event — settle-and-hold per the blueprint's
        // "near-static hold" beat, amplitude kept tiny since three cards are
        // concurrently alive (/N-damped per sine-wave-loop convention).
        var jitterDriver = { p: 0 };
        tl.to(
          jitterDriver,
          {
            p: Math.PI * 2 * 2,
            duration: 1.0,
            ease: "none",
            onUpdate: function () {
              var amp = 1.2; // px, damped for three concurrent elements
              var offset = Math.sin(jitterDriver.p) * amp;
              // gsap.set (not raw style.transform) so this composes with the
              // GSAP-owned transform cache from each card's earlier fromTo
              // (scale settles to 1, y settles to 0) instead of clobbering it.
              gsap.set(card1, { y: offset * 0.6 });
              gsap.set(card2, { y: offset * 0.8 });
              gsap.set(card3, { y: offset * 1.0 });
            },
          },
          11.0
        );

        window.__timelines["07-resolution"] = tl;
      </script>
