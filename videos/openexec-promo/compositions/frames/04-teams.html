          text-transform: uppercase;

                <div data-hf-id="hf-14gp" class="sub-item" id="sub-cmo-0"><span data-hf-id="hf-0ome" class="sub-marker">/</span><span data-hf-id="hf-wrn3" class="sub-label">growth_marketer</span></div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        var tl = gsap.timeline({ paused: true });

        // Prep connector strokes: measure real geometry, start fully offset (invisible).
        // Per svg-path-draw rule: dasharray = pathLength, dashoffset = pathLength -> 0.
        ["ceo", "cfo", "cto", "cmo"].forEach(function (key) {
          var path = document.getElementById("conn-" + key);
          var len = path.getTotalLength();
          path.style.strokeDasharray = len;
          path.style.strokeDashoffset = len;
        });

        // Scene 1 (0.0-1.0s): ink-black ground already painted by the .ground clip.
        // Mono kicker "HIERARCHICAL TEAMS" fades in top-left. Nothing else on screen.
        tl.fromTo(
          "#kicker-wrap",
          { opacity: 0 },
          { opacity: 1, duration: 0.6, ease: "power3.out" },
          0.3
        );

        // Helper: build one CXO column's reveal — node lands via short slide+fade
        // (center-outward-expansion flavor: node settles from a slightly raised,
        // scaled-down state into place), then its hairline connector draws upward
        // into the node (svg-path-draw), then sub-agents cascade in beneath.
        function buildColumn(key, subCount, startAt) {
          var nodeSel = "#node-" + key;
          var connSel = "#conn-" + key;

          // CXO node: slide + fade + slight scale settle, out-eased.
          tl.fromTo(
            nodeSel,
            { opacity: 0, y: -14, scale: 0.92 },
            { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "power3.out" },
            startAt
          );

          // Connector hairline draws upward (dashoffset -> 0) right after the node lands.
          tl.to(
            connSel,
            { strokeDashoffset: 0, duration: 0.45, ease: "power2.out" },
            startAt + 0.35
          );

          // Sub-agents cascade in beneath, staggered, timed to land as the
          // connector finishes drawing.
          var subSelectors = [];
          for (var i = 0; i < subCount; i++) {
            subSelectors.push("#sub-" + key + "-" + i);
          }
          tl.fromTo(
            subSelectors,
            { opacity: 0, y: 10 },
            {
              opacity: 1,
              y: 0,
              duration: 0.4,
              ease: "power3.out",
              stagger: 0.12
            },
            startAt + 0.55
          );
        }

        // Scene 2 (1.0-3.5s): CEO column — 2 sub-agents.
        buildColumn("ceo", 2, 1.0);

        // Scene 3 (3.5-6.5s): CFO column — 3 sub-agents.
        buildColumn("cfo", 3, 3.5);

        // Scene 4 (6.5-9.5s): CTO column — 3 sub-agents.
        buildColumn("cto", 3, 6.5);

        // Scene 5 (9.5-12.0s): CMO column — 3 sub-agents. All four columns now
        // co-resident; the complete hierarchy holds static to end with a subtle
        // deterministic jitter (sine-based, no Math.random/Date.now) on the full
        // grid as a quiet settle breather.
        buildColumn("cmo", 3, 9.5);

        var jitterTarget = document.querySelector(".org-grid");
        var jitterDriver = { t: 0 };
        tl.to(
          jitterDriver,
          {
            t: 12,
            duration: 12,
            ease: "none",
            onUpdate: function () {
              if (jitterDriver.t >= 11.0) {
                var p = (jitterDriver.t - 11.0) * Math.PI * 2 * 0.5;
                var jitterY = Math.sin(p) * 0.6;
                jitterTarget.style.transform = "translateY(" + jitterY.toFixed(2) + "px)";
              } else {
                jitterTarget.style.transform = "translateY(0px)";
              }
            }
          },
          0
        );

        window.__timelines["04-teams"] = tl;
      </script>
