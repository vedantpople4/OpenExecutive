<!DOCTYPE html>
<html>

  <body>
    <template>
      <style>
        @font-face {
          font-family: "Barlow";
          font-weight: 400;

          src: url("assets/fonts/barlow-400.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 600;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-600.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 700;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-700.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 800;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-800.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 900;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-900.woff2") format("woff2");
        }
        @font-face {
          font-family: "IBM Plex Mono";
          font-weight: 500;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/ibm-plex-mono-500.woff2") format("woff2");
        }

        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: "Barlow", sans-serif;
          container-type: size;
        }

        .ground {
          position: absolute;
          inset: 0;
          background: #e85d26;
        }

        .stage {
          position: absolute;
          inset: 0;
        }

        /* Cover chrome — top-left rule stub + mono kicker, per frame.md "cover" treatment */
        .chrome-wrap {
          position: absolute;
          top: 9cqh;
          left: 5.5cqw;
          display: flex;
          align-items: center;
          gap: 1cqw;
          opacity: 0;
        }

        .rule-stub {
          width: 36px;
          height: 2px;
          background: #111111;
          flex: none;
        }

        .kicker {
          font-family: "IBM Plex Mono", monospace;
          font-weight: 500;
          font-size: 0.72cqw;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: rgb(58, 26, 13);
          white-space: nowrap;
        }

        /* Wordmark — Barlow display: 13cqw, weight 900, lowercase, -0.04em, lh 0.88 */
        .wordmark-wrap {
          position: absolute;
          top: 20cqh;
          left: 5.5cqw;
          max-width: 78cqw;
        }

        .wordmark {
          margin: 0;
          font-family: "Barlow", sans-serif;
          font-weight: 900;
          font-size: 13cqw;
          line-height: 0.88;
          letter-spacing: -0.04em;
          text-transform: lowercase;
          color: #111111;
          opacity: 0;
        }

        /* Lead line — Barlow lead: 1.6cqw, weight 400, lh 1.5, 75% ink opacity */
        .lead-wrap {
          position: absolute;
          top: 56cqh;
          left: 5.5cqw;
          max-width: 60cqw;
        }

        .lead {
          margin: 0;
          font-family: "Barlow", sans-serif;
          font-weight: 400;
          font-size: 1.6cqw;
          line-height: 1.5;
          color: rgb(58, 26, 13);
        }

        .lead .word {
          display: inline-block;
          opacity: 0;
          will-change: transform, opacity;
        }
      </style>

      <div data-hf-id="hf-1j0m" id="root" data-composition-id="03-bridge-product" data-width="1920" data-height="1080" data-duration="7.5">
        <div data-hf-id="hf-b8us" id="ground-03-bridge-product" class="clip ground" data-start="0" data-duration="7.5" data-track-index="0"></div>

        <div data-hf-id="hf-tan6" class="stage">
          <div data-hf-id="hf-9nhr" class="chrome-wrap" id="chrome">
            <div data-hf-id="hf-har7" class="rule-stub"></div>
            <div data-hf-id="hf-k43m" class="kicker">OpenExec — AI Executive Board</div>
          </div>

          <div data-hf-id="hf-3tjc" class="wordmark-wrap">
            <h1 data-hf-id="hf-zx95" class="wordmark" id="wordmark">OpenExec</h1>
          </div>

          <div data-hf-id="hf-700b" class="lead-wrap">
            <p data-hf-id="hf-vbmt" class="lead" id="lead"></p>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        var chromeEl = document.getElementById("chrome");
        var wordmarkEl = document.getElementById("wordmark");
        var leadEl = document.getElementById("lead");

        // Build the lead line as per-word spans up front (static end-state markup),
        // then reveal each span on its own tween — never innerHTML-mutated mid-timeline.
        var LEAD_WORDS = "An AI board that argues for real reasons.".split(" ");
        LEAD_WORDS.forEach(function (w, i) {
          var span = document.createElement("span");
          span.className = "word";
          span.textContent = w;
          leadEl.appendChild(span);
          if (i < LEAD_WORDS.length - 1) {
            leadEl.appendChild(document.createTextNode(" "));
          }
        });
        var wordEls = leadEl.querySelectorAll(".word");

        var tl = gsap.timeline({ paused: true });

        // Scene 1 (0.0-1.5s): fire-orange ground fills as the zoom-through cut arrives.
        // Rule stub + mono kicker fade in top-left, camera static.
        tl.fromTo(
          chromeEl,
          { opacity: 0 },
          { opacity: 1, duration: 0.7, ease: "power3.out" },
          0.3
        );

        // Scene 2 (1.5-4.0s): "OpenExec" lands as the massive lowercase Barlow display
        // wordmark, hard-cut FLASH-in (no fade/slide) — Cover's signature massive-type move.
        tl.set(wordmarkEl, { opacity: 1 }, 1.5);

        // Scene 3 (4.0-7.0s): lead line enters beneath via per-word staggered fade,
        // "Cue 2" per the on-screen cues list. Holds to end — Cover's restraint.
        tl.fromTo(
          wordEls,
          { opacity: 0, y: 10 },
          {
            opacity: 1,
            y: 0,
            duration: 0.45,
            ease: "power3.out",
            stagger: 0.07
          },
          4.0
        );

        // Subtle deterministic settle jitter in the final ~1.5s (5.5 -> 7.0), sine-based
        // (no Math.random / no Date.now) — a quiet hold on the resolved wordmark, matching
        // the "at most subtle jitter" spec for this held/breather beat. Not a new motion.
        var jitterDriver = { t: 0 };
        tl.to(
          jitterDriver,
          {
            t: 7,
            duration: 7,
            ease: "none",
            onUpdate: function () {
              if (jitterDriver.t >= 5.5) {
                var p = (jitterDriver.t - 5.5) * Math.PI * 2 * 0.5;
                var jitterY = Math.sin(p) * 0.6;
                wordmarkEl.style.transform = "translateY(" + jitterY.toFixed(2) + "px)";
              } else {
                wordmarkEl.style.transform = "translateY(0px)";
              }
            }
          },
          0
        );

        window.__timelines["03-bridge-product"] = tl;
      </script>
    </template>
  </body>
</html>
