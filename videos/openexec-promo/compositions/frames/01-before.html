<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>01-before</title>
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "Barlow";
          font-weight: 400;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-400.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 600;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-600.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 700;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-700.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 800;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-800.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 900;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-900.woff2") format("woff2");
        }
        @font-face {
          font-family: "IBM Plex Mono";
          font-weight: 500;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/ibm-plex-mono-500.woff2") format("woff2");
        }

        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: "Barlow", sans-serif;
          container-type: size;
        }

        .ground {
          position: absolute;
          inset: 0;
          background: #111111;
        }

        .stage {
          position: absolute;
          inset: 0;
          display: flex;
          align-items: center;
        }

        .line-wrap {
          position: relative;
          width: 100%;
          padding-left: 5.5cqw;
          padding-right: 5.5cqw;
        }

        /* headline text — Barlow h1: 7.5cqw, weight 800, lowercase, -0.03em, lh 0.9 */
        .headline {
          margin: 0;
          max-width: 78cqw;
          font-family: "Barlow", sans-serif;
          font-weight: 800;
          font-size: 7.5cqw;
          line-height: 0.9;
          letter-spacing: -0.03em;
          text-transform: lowercase;
          color: #f0ece5;
          opacity: 0;
        }

        .headline .accent {
          color: #e85d26;
        }
      </style>

      <div data-hf-id="hf-o35s" id="root" data-composition-id="01-before" data-width="1920" data-height="1080" data-duration="7.5">
        <div data-hf-id="hf-b8us" id="ground-01-before" class="clip ground" data-start="0" data-duration="7.5" data-track-index="0"></div>

        <div data-hf-id="hf-tan6" class="stage">
          <div data-hf-id="hf-i6jr" class="line-wrap">
            <h1 data-hf-id="hf-1zro" id="before-headline" class="headline">CTO disagreed.</h1>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        var el = document.getElementById("before-headline");

        // Discrete text states — hard-cut, no transition, no roll/scroll/blur.
        // t = time in seconds at which the state becomes active.
        var STATES = [
          { t: 0.0, html: "", opacity: 0 }, // bare canvas
          { t: 0.35, html: "CTO disagreed.", opacity: 1 }, // Scene 1: cue 1 flash-in dead-left
          { t: 3.0, html: "", opacity: 0 }, // Scene 2: hard-cut clear
          { t: 3.4, html: 'The board didn’t <span class="accent">flinch</span>.', opacity: 1 } // Scene 3: cue 2 flash-in, "flinch" inked orange
        ];

        function stateAt(time) {
          for (var i = STATES.length - 1; i >= 0; i--) {
            if (time >= STATES[i].t) return STATES[i];
          }
          return STATES[0];
        }

        var tl = gsap.timeline({ paused: true });

        var driver = { t: 0 };
        tl.to(
          driver,
          {
            t: 7,
            duration: 7,
            ease: "none",
            onUpdate: function () {
              var s = stateAt(driver.t);
              if (el.dataset.state !== s.t + "") {
                el.dataset.state = s.t + "";
                el.innerHTML = s.html;
              }
              el.style.opacity = s.opacity;

              // Subtle deterministic settle jitter in the final ~1s (6.0 -> 7.0),
              // sine-based (no Math.random / no Date.now) — a quiet hold, not new motion.
              if (driver.t >= 6.0) {
                var p = (driver.t - 6.0) * Math.PI * 2 * 0.6; // slow, low-amplitude
                var jitterY = Math.sin(p) * 0.6; // px
                el.style.transform = "translateY(" + jitterY.toFixed(2) + "px)";
              } else {
                el.style.transform = "translateY(0px)";
              }
            }
          },
          0
        );

        window.__timelines["01-before"] = tl;
      </script>
    </template>
  </body>
</html>
