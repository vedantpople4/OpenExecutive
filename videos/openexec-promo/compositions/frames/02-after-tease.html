<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>02-after-tease</title>
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "Barlow";
          font-weight: 400;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-400.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 600;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-600.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 700;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-700.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 800;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-800.woff2") format("woff2");
        }
        @font-face {
          font-family: "Barlow";
          font-weight: 900;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/barlow-900.woff2") format("woff2");
        }
        @font-face {
          font-family: "IBM Plex Mono";
          font-weight: 500;
          font-style: normal;
          font-display: swap;
          src: url("assets/fonts/ibm-plex-mono-500.woff2") format("woff2");
        }

        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: "Barlow", sans-serif;
          container-type: size;
        }

        .ground {
          position: absolute;
          inset: 0;
          background: #111111;
        }

        .stage {
          position: absolute;
          inset: 0;
          display: flex;
          align-items: center;
        }

        .line-wrap {
          position: relative;
          width: 100%;
          padding-left: 5.5cqw;
          padding-right: 5.5cqw;
        }

        /* headline text — Barlow h2: 4.5cqw, weight 700, lowercase, -0.02em, lh 1.1 —
           chosen over h1 because these cues are full sentences (5+ words), per
           frame.md's fit-to-measure rule (5+ words -> h2). */
        .headline {
          margin: 0;
          max-width: 78cqw;
          font-family: "Barlow", sans-serif;
          font-weight: 700;
          font-size: 4.5cqw;
          line-height: 1.1;
          letter-spacing: -0.02em;
          text-transform: lowercase;
          color: #f0ece5;
        }

        .headline .word {
          display: inline-block;
          opacity: 0;
          will-change: opacity, transform;
        }

        .headline .word.accent {
          color: #e85d26;
        }

        /* space runs between inline-block words still need to render */
        .headline .space {
          display: inline-block;
          width: 0.45cqw;
        }
      </style>

      <div data-hf-id="hf-jvxl" id="root" data-composition-id="02-after-tease" data-width="1920" data-height="1080" data-duration="7">
        <div data-hf-id="hf-zhed" id="ground-02-after-tease" class="clip ground" data-start="0" data-duration="7" data-track-index="0"></div>

        <div data-hf-id="hf-tan6" class="stage">
          <div data-hf-id="hf-i6jr" class="line-wrap">
            <h2 data-hf-id="hf-swxe" id="tease-headline" class="headline"></h2>
          </div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        var el = document.getElementById("tease-headline");

        // Cue 1 and Cue 2 split into words; "real team" / "real research" inked accent.
        // Each word wrapped in .word (opacity+translateY tween target); spaces preserved
        // as literal .space elements so inline-block words don't collide.
        function buildWordSpans(words, accentStartIdx, accentEndIdx) {
          var html = "";
          for (var i = 0; i < words.length; i++) {
            var isAccent = i >= accentStartIdx && i <= accentEndIdx;
            html +=
              '<span class="word' +
              (isAccent ? " accent" : "") +
              '" data-i="' +
              i +
              '">' +
              words[i] +
              "</span>";
            if (i < words.length - 1) html += '<span class="space"></span>';
          }
          return html;
        }

        // Cue 1: "Because every executive has a real team behind them."
        // words:   0       1     2         3   4  5    6    7      8
        var CUE1_WORDS = [
          "Because",
          "every",
          "executive",
          "has",
          "a",
          "real",
          "team",
          "behind",
          "them."
        ];
        var CUE1_HTML = buildWordSpans(CUE1_WORDS, 5, 6); // "real team" -> accent

        // Cue 2: "And every claim is checked against real research."
        // words:  0    1     2      3  4       5       6    7
        var CUE2_WORDS = [
          "And",
          "every",
          "claim",
          "is",
          "checked",
          "against",
          "real",
          "research."
        ];
        var CUE2_HTML = buildWordSpans(CUE2_WORDS, 6, 7); // "real research" -> accent

        var tl = gsap.timeline({ paused: true });

        // Scene 1 (0.0-3.5s): ink-black ground continues (crossfade handled by the
        // injector at the composition boundary). Cue 1 enters via per-word staggered
        // fade, left-anchored. Reveal begins immediately so the full sentence lands
        // well inside the 3.5s window (9 words).
        tl.call(
          function () {
            el.innerHTML = CUE1_HTML;
          },
          null,
          0.0
        );
        tl.fromTo(
          "#tease-headline .word",
          { opacity: 0, y: "0.6cqw" },
          {
            opacity: 1,
            y: "0cqw",
            duration: 0.4,
            ease: "power3.out",
            stagger: 0.1
          },
          0.1
        );

        // Scene 2 (3.5-4.0s): Cue 1 clears via a gentle crossfade (softer than Frame
        // 1's hard cut -- this is a held/breather beat).
        tl.to(
          "#tease-headline .word",
          {
            opacity: 0,
            duration: 0.4,
            ease: "power2.inOut",
            stagger: 0.02
          },
          3.5
        );

        // Swap DOM content once fully cleared, just before Cue 2 begins revealing.
        tl.call(
          function () {
            el.innerHTML = CUE2_HTML;
            gsap.set("#tease-headline .word", { opacity: 0, y: "0.6cqw" });
          },
          null,
          3.98
        );

        // Scene 3 (4.0-8.0s): Cue 2 enters via per-word staggered fade; "real
        // research" inks fire-orange. Holds to end, static; subtle jitter only in
        // the final ~1.5s (6.5 -> 8.0).
        tl.fromTo(
          "#tease-headline .word",
          { opacity: 0, y: "0.6cqw" },
          {
            opacity: 1,
            y: "0cqw",
            duration: 0.45,
            ease: "power3.out",
            stagger: 0.11
          },
          4.15
        );

        // Deterministic settle jitter in the final ~1.5s, sine-based (no
        // Math.random / no Date.now) -- a quiet hold, not new motion.
        var jitterDriver = { t: 0 };
        tl.to(
          jitterDriver,
          {
            t: 8,
            duration: 8,
            ease: "none",
            onUpdate: function () {
              if (jitterDriver.t >= 6.5) {
                var p = (jitterDriver.t - 6.5) * Math.PI * 2 * 0.5;
                var jitterY = Math.sin(p) * 0.6;
                el.style.transform = "translateY(" + jitterY.toFixed(2) + "px)";
              } else {
                el.style.transform = "translateY(0px)";
              }
            }
          },
          0
        );

        window.__timelines["02-after-tease"] = tl;
      </script>
    </template>
  </body>
</html>
