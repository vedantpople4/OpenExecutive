# OpenExec Configuration
name: Executive Board Simulation
version: 0.1.0

# Agent configuration
agents:
  enabled:
    - ceo     # Chief Executive Officer - Focus: Why?
    - cfo     # Chief Financial Officer - Focus: How much?
    - cto     # Chief Technology Officer - Focus: How to build it?
    - cmo     # Chief Marketing Officer - Focus: How to sell it?

  settings:
    analysis_depth: medium      # low | medium | high
    max_interactions: 10        # max agent feedback loop iterations
    confidence_threshold: 0.6   # minimum confidence for recommendations

# Simulation settings
simulation:
  phases:
    - name: inception
      weight: 0.1
    - name: analysis
      weight: 0.5
    - name: review
      weight: 0.25
    - name: synthesis
      weight: 0.1

# Output settings
output:
  format: markdown
  include_sections:
    - executive_summary
    - individual_reports
    - synthesized_recommendations
    - risk_assessment
